<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omawild Corporate Narrative</title>
  
  <!-- Favicon Asset Injections -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <style>
    /* -------------------------------------------------------------
       CORE ENGINE STYLES 
    ---------------------------------------------------------------- */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
    body, html { overflow: hidden; background-color: #ffffff; color: #121212; height: 100%; width: 100%; }
    
    /* Mobile Progress Bar */
    .mobile-progress-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(0, 0, 0, 0.05);
      z-index: 1003;
      display: none;
    }
    .mobile-progress-bar {
      height: 100%;
      width: 0%;
      background: var(--brand-orange, #E15A27);
      transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Clean Minimal Floating Header & Mobile Menu */
    .corp-header { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 80px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 40px; 
      z-index: 1000; 
      background: transparent; 
    }
    
    /* Global Dynamic SVG Logo Implementation */
    .corp-logo { 
      display: flex;
      align-items: center;
      text-decoration: none; 
      z-index: 1002; 
    }
    .corp-logo svg {
      width: auto;
      height: 18px; 
      display: block;
      fill: #121212; 
      transition: fill 0.2s ease;
    }
    
    /* Dynamic Theme Support for SVG Logo */
    .theme-light .corp-logo svg { fill: #121212; }
    .theme-dark .corp-logo svg { fill: #ffffff; }
    
    .corp-nav { display: flex; align-items: center; gap: 32px; }
    .corp-nav-link { font-size: 14px; font-weight: 500; text-decoration: none; color: #121212; opacity: 0.8; transition: all 0.2s; }
    .corp-nav-link:hover { opacity: 1; color: var(--brand-orange, #E15A27); }
    .corp-cta { padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 600; text-decoration: none; border: 1px solid #121212; color: #121212; transition: all 0.2s; z-index: 1002; }
    .corp-cta:hover { background: var(--brand-orange, #E15A27); border-color: var(--brand-orange, #E15A27); color: #ffffff; }

    /* Mobile Header Action Grouping */
    .mobile-header-actions { display: none; align-items: center; width: 100%; height: 100%; z-index: 1002; position: absolute; left: 0; top: 0; }
    
    /* Universal Viewport Centered Counter Fix */
    .mobile-slide-counter {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(18, 18, 18, 0.4);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      pointer-events: none;
      margin: 0;
      white-space: nowrap;
      z-index: 1003;
      transition: all 0.2s ease;
    }
    .mobile-slide-counter .active-digit {
      color: var(--brand-orange, #E15A27);
    }

    /* Right-aligned Actions Container */
    .mobile-actions-right {
      margin-left: auto;
      margin-right: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 1002;
    }
    .mobile-pinned-cta { display: inline-block; padding: 10px 18px; font-size: 13px; font-weight: 600; text-decoration: none; border: 1.5px solid #121212; color: #121212; border-radius: 50px; transition: all 0.2s; white-space: nowrap; }
    .mobile-pinned-cta:hover { background: var(--brand-orange, #E15A27); border-color: var(--brand-orange, #E15A27); color: #ffffff; }

    /* Mobile Hamburger Trigger */
    .mobile-hamburger { display: none; background: none; border: none; flex-direction: column; justify-content: space-between; width: 22px; height: 15px; cursor: pointer; }
    .mobile-hamburger span { display: block; width: 100%; height: 2px; background-color: #121212; transition: all 0.3s ease; }
    .mobile-hamburger.is-active span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .mobile-hamburger.is-active span:nth-child(2) { opacity: 0; }
    .mobile-hamburger.is-active span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* Mobile Slide-out Drawer */
    .mobile-menu-drawer { display: none; position: fixed; top: 0; right: -100%; width: 300px; height: 100vh; height: 100dvh; background: #ffffff; box-shadow: -10px 0 30px rgba(0,0,0,0.05); z-index: 1001; transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1); padding: 100px 32px 40px 32px; flex-direction: column; gap: 24px; }
    .mobile-menu-drawer.is-active { right: 0; display: flex; }
    
    /* Drawer Close Indicator */
    .drawer-close-btn { position: absolute; top: 24px; right: 24px; background: none; border: none; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #121212; cursor: pointer; display: flex; align-items: center; gap: 6px; opacity: 0.7; transition: opacity 0.2s; }
    .drawer-close-btn:hover { opacity: 1; }

    /* Left Sidebar Dots Navigation */
    .timeline-progress-sidebar { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; z-index: 100; }
    .timeline-dot-track { display: flex; flex-direction: column; align-items: center; gap: 20px; cursor: pointer; }
    .timeline-node { width: 8px; height: 8px; border-radius: 50%; background: rgba(0, 0, 0, 0.15); transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
    .timeline-node.is-current { background: var(--brand-orange, #E15A27); transform: scale(1.4); }

    /* Scroll Engine Container */
    .narrative-wrapper { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100vh; height: 100dvh; width: 100vw; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .narrative-wrapper::-webkit-scrollbar { display: none; }
    
    /* Base Section Design with Flexible Content Centering */
    .narrative-section { position: relative; width: 100vw; height: 100vh; height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px 80px; cursor: pointer; background-color: #ffffff !important; }
    
    /* Reveal Transition Animation Engine */
    .fade-el { opacity: 0; transform: translateY(20px); transition: opacity 0.9s cubic-bezier(0.25, 1, 0.5, 1), transform 0.9s cubic-bezier(0.25, 1, 0.5, 1); }
    .narrative-section.is-active .fade-el { opacity: 1; transform: translateY(0); }
    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.22s; }
    .delay-3 { transition-delay: 0.35s; }
    .delay-4 { transition-delay: 0.48s; }

    /* Global Typography Foundations */
    .eyebrow { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 24px; font-weight: 600; opacity: 0.7; }
    
    /* Premium Sans-Serif Headers */
    .headline-large { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 44px; font-weight: 800; line-height: 1.15; margin-bottom: 24px; color: #121212; }
    
    /* Tightened Premium Body Spacings */
    .body-lead { font-size: 15px; line-height: 1.45; opacity: 0.7; color: #121212; font-weight: 400; }
    
    /* Standardized Button Style */
    .btn-unified { 
      display: inline-block; 
      padding: 14px 28px; 
      border-radius: 50px; 
      text-decoration: none; 
      font-weight: 600; 
      font-size: 13.5px; 
      background-color: #ffffff;
      border: 2px solid var(--brand-orange, #E15A27);
      color: var(--brand-orange, #E15A27);
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); 
      cursor: pointer;
    }
    .btn-unified:hover { 
      background-color: var(--brand-orange, #E15A27);
      color: #ffffff;
    }
    
    /* Layout System 001: Split Screen Welcome */
    .bleed-split-grid { display: flex; width: 100vw; height: 100vh; height: 100dvh; }
    .split-text-pane { width: 50%; flex: 0 0 50%; display: flex; flex-direction: column; justify-content: center; padding: 0 8% 0 10%; }
    .split-media-pane { width: 50%; flex: 0 0 50%; position: relative; overflow: hidden; }
    .bleed-img-element { width: 100%; height: 100%; object-fit: cover; }

    /* Layout Systems: Centered Copy Formations with Adjustable Max-Widths */
    .centered-narrative-inner { max-width: 680px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin: auto 0; }
    
    /* Specific Constraint for Slide 7 Content Width */
    .centered-narrative-inner.slide-seven-width {
      max-width: 850px;
    }

    /* Fixed Image Sizing Constraint for Slides 3 and 4 */
    .embedded-layout-asset { width: 100%; max-width: 620px; height: 340px; border-radius: 4px; margin-top: 32px; object-fit: cover; }
    
    .caption-footer-para { max-width: 680px; text-align: center; font-size: 14px; line-height: 1.45; opacity: 0.8; margin-top: 28px; font-weight: 400; }

    /* Fixed Centering */
    .bottom-scroll-hint { 
      position: absolute; 
      bottom: 35px; 
      left: 0; 
      right: 0;
      margin: 0 auto;
      width: max-content;
      text-align: center; 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 0.1em; 
      font-weight: 500; 
      opacity: 0.6; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 8px; 
      z-index: 10; 
    }

    /* Layout System 005: File Tab UI */
    .expression-showcase-wrap { width: 100%; max-width: 800px; display: flex; flex-direction: column; position: relative; margin-top: 20px; }
    .expression-tabs-row { display: flex; gap: 6px; margin-bottom: -1px; z-index: 1; position: relative; align-items: flex-end; }
    
    .tab-btn { 
      padding: 14px 24px; 
      border-radius: 14px 14px 0 0; 
      border: none; 
      font-size: 11px; 
      font-weight: 700; 
      letter-spacing: 0.05em; 
      text-transform: uppercase; 
      cursor: pointer; 
      transition: all 0.2s ease-in-out; 
      margin-bottom: -1px; 
      position: relative; 
      z-index: 1; 
    }
    
    .expression-main-card { 
      display: flex; 
      border-radius: 0 20px 20px 20px; 
      padding: 28px; 
      gap: 36px; 
      align-items: center; 
      min-height: 320px; 
      position: relative; 
      z-index: 2; 
      background-color: #F7F5F0; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    }
    
    .expression-left-graphic { 
      width: 32%; 
      flex: 0 0 32%; 
      max-width: 240px; 
      border-radius: 12px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      aspect-ratio: 1 / 1; 
      overflow: hidden; 
      position: relative; 
      padding: 0; 
    }
    .expression-prod-img { width: 100%; height: 100%; object-fit: cover; }
    
    .expression-right-details { width: 68%; display: flex; flex-direction: column; color: #121212; text-align: left; }
    .expr-eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; opacity: 0.7; color: #121212; }
    .expr-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 4px; line-height: 1.15; color: #121212; }
    .expr-sub { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 20px; opacity: 0.6; color: #121212; }
    .expr-desc { font-size: 14px; line-height: 1.5; margin-bottom: 24px; opacity: 0.8; font-weight: 400; color: #222222; }
    .expr-divider { width: 100%; height: 1px; background: rgba(18, 18, 18, 0.15); margin-bottom: 20px; }
    .expr-footer-note { font-size: 12px; font-weight: 500; opacity: 0.7; color: #121212; }

    /* -------------------------------------------------------------
       FIXED: PREMIUM SLIDER ALIGNMENT SYSTEM
    ---------------------------------------------------------------- */
    .history-timeline-outer { 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      position: relative; 
      margin-top: 32px; 
    }
    
    .history-timeline-container { 
      display: flex; 
      width: 100%; 
      padding: 10px 0 30px 0; /* Clean vertical safety margins */
      justify-content: flex-start; 
      overflow-x: auto; 
      scrollbar-width: none; 
      scroll-snap-type: x mandatory; 
      -webkit-overflow-scrolling: touch; 
    }
    .history-timeline-container::-webkit-scrollbar { display: none; }
    
    /* Visual spacer mechanics to emulate a true padding bounding-box */
    .timeline-slider-spacer {
      flex: 0 0 110px; /* Aligns first card perfectly to text flow grid */
      width: 110px;
    }

    .timeline-column-card { 
      flex: 0 0 240px; 
      background-color: #F7F5F0; 
      border-radius: 16px; 
      padding: 10px; 
      display: flex; 
      flex-direction: column; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.01); 
      scroll-snap-align: start; 
      margin-right: 20px; /* Card gap strategy */
    }
    .timeline-column-card:last-of-type {
      margin-right: 0;
    }

    .timeline-card-image-wrapper { 
      width: 100%; 
      aspect-ratio: 3 / 4; 
      border-radius: 10px; 
      background-color: #E2DDD5; 
      overflow: hidden; 
      margin-bottom: 10px; 
    }
    .timeline-card-image { width: 100%; height: 100%; object-fit: cover; }
    .timeline-card-caption { font-size: 13px; line-height: 1.4; color: #222222; font-weight: 400; opacity: 0.9; text-align: left; }

    /* Layout System 008: Sand Forecasting Panel */
    .forecasting-split-layout { display: flex; width: 100%; max-width: 1040px; align-items: center; gap: 64px; justify-content: space-between; padding: 0 40px; margin: auto 0; }
    .forecast-left-content { width: 50%; text-align: left; }
    .forecast-left-content .headline-large { font-size: 46px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 800; line-height: 1.15; }
    
    .forecast-right-card { 
      width: 440px; 
      background: #F7F5F0; 
      border-radius: 28px; 
      padding: 40px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.02); 
      border: 1px solid #EAE8E3; 
      display: flex; 
      flex-direction: column; 
      text-align: left; 
    }
    .fc-eyebrow { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 24px; }
    .fc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .fc-label { font-size: 16px; font-weight: 600; color: #121212; }
    .fc-value { font-size: 16px; font-weight: 700; color: var(--brand-orange, #E15A27); }
    
    .fc-slider-input { -webkit-appearance: none; width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; outline: none; margin-bottom: 28px; transition: background 0.2s; }
    .fc-slider-input::-webkit-slider-thumb { 
      -webkit-appearance: none; 
      appearance: none; 
      width: 20px; 
      height: 20px; 
      border-radius: 50%; 
      background: var(--brand-orange, #E15A27); 
      cursor: pointer; 
      transition: transform 0.15s; 
    }
    .fc-slider-input::-webkit-slider-thumb:hover { transform: scale(1.15); }
    
    .fc-description { font-size: 13.5px; line-height: 1.4; color: #555; margin-bottom: 32px; border-bottom: 1px solid #EAE8E3; padding-bottom: 32px; }
    .fc-output-num { 
      font-size: 64px; 
      font-weight: 700; 
      line-height: 1; 
      color: var(--brand-orange, #E15A27); 
      letter-spacing: -0.02em; 
      margin-bottom: 8px; 
    }
    .fc-output-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: #777; text-transform: uppercase; }

    /* Layout System 009: TAILORED PARTNERSHIP */
    .partnership-header-container { width: 100%; max-width: 900px; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .partnership-stack-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; margin-top: 14px; }
    .partnership-pills-row { display: flex; gap: 10px; margin-bottom: 16px; width: 100%; justify-content: center; overflow-x: auto; scrollbar-width: none; }
    .partnership-pills-row::-webkit-scrollbar { display: none; }
    
    .pill-item-btn { 
      padding: 11px 23px; 
      border-radius: 50px; 
      border: 1px solid #EAEAEA; 
      background: #FDFDFD; 
      font-size: 13.5px; 
      font-weight: 600; 
      color: #121212; 
      cursor: pointer; 
      white-space: nowrap; 
      transition: all 0.2s ease; 
    }
    .pill-item-btn.is-active { 
      background: #121212; 
      color: #ffffff; 
      border-color: #121212; 
    }
    
    .partnership-compact-card { 
      background: #F7F5F0; 
      border-radius: 24px; 
      border: 1px solid #EAE8E3; 
      padding: 48px; 
      display: flex; 
      flex-direction: column; 
      width: 100%; 
      box-shadow: 0 4px 24px rgba(0,0,0,0.01); 
      align-items: flex-start; 
      text-align: left; 
    }
    .display-header-title { font-size: 26px; font-weight: 700; color: #121212; margin-bottom: 14px; line-height: 1.25; text-align: left; }
    .display-body-para { font-size: 14.5px; line-height: 1.5; color: #444444; margin-bottom: 22px; text-align: left; }
    
    .display-bullet-grid { 
      display: flex; 
      flex-direction: column; 
      gap: 11px; 
      margin-bottom: 26px; 
      align-items: flex-start;
      text-align: left;
    }
    .display-bullet { font-size: 13.5px; font-weight: 500; color: #222222; display: flex; align-items: center; gap: 10px; }
    .display-bullet::before { content: '✓'; color: #121212; font-weight: 900; }
    
    .interactive-safe-zone, input, a, button { cursor: auto; }

    /* -------------------------------------------------------------
       RESPONSIVE ADAPTATIONS
    ---------------------------------------------------------------- */
    @media (max-width: 968px) {
      .narrative-section { 
        padding: 64px 24px 24px 24px; 
        display: flex;
        flex-direction: column;
        justify-content: space-between; 
        align-items: center;
      }
      .timeline-progress-sidebar { display: none; }
      .mobile-progress-container { display: block; }
      
      .corp-header { 
        padding: 0 20px; 
        height: 64px; 
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: fixed; 
        width: 100%;
        background: transparent;
      }
      .corp-nav { display: none; }
      .mobile-header-actions { 
        display: flex; 
        width: 100%; 
        height: 100%; 
        align-items: center; 
        position: absolute;
        left: 0;
        top: 0;
      }

      .mobile-slide-counter {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: 11px;
      }

      .mobile-hamburger { display: flex; }
      .mobile-menu-drawer { display: flex; }
      
      .bleed-split-grid { flex-direction: column-reverse; width: 100%; height: 100%; }
      .split-text-pane { padding: 40px 24px; width: 100%; flex: 1; justify-content: center; align-items: center; text-align: center; }
      .split-text-pane .body-lead { margin-left: auto; margin-right: auto; }
      .split-media-pane { width: 100%; flex: 1; }
      
      .headline-large { font-size: 26px; margin-bottom: 16px; }
      .eyebrow { margin-bottom: 14px; }
      .embedded-layout-asset { max-width: 100%; height: 220px; margin-top: 16px; }
      
      #slide-sec-2 .headline-large { font-size: 32px !important; }
      #slide-sec-6 .headline-large { font-size: 26px !important; }

      .centered-narrative-inner {
        margin: auto 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .expression-showcase-wrap { margin-top: 20px; max-width: 100%; }
      .expression-left-graphic { display: none !important; }
      .expression-right-details { width: 100%; text-align: left; }
      .expression-main-card { flex-direction: column; border-radius: 0 0 12px 12px; padding: 20px; gap: 0; min-height: auto; }
      .expression-tabs-row { display: flex; flex-wrap: nowrap; width: 100%; gap: 4px; overflow-x: auto; scrollbar-width: none; }
      .expression-tabs-row::-webkit-scrollbar { display: none; }
      .tab-btn { flex: 0 0 auto; text-align: center; border-radius: 10px 10px 0 0; padding: 12px 14px; font-size: 10px; font-weight: 700; white-space: nowrap; }
      .expr-title { font-size: 24px; }
      .expr-desc { font-size: 13px; margin-bottom: 16px; }
      .expr-divider { margin-bottom: 14px; }
      
      .history-timeline-outer { margin-top: 20px; }
      
      /* Mobile Adaptive Spacer Mapping */
      .timeline-slider-spacer {
        flex: 0 0 24px;
        width: 24px;
      }
      .timeline-column-card { flex: 0 0 190px; border-radius: 12px; padding: 8px; margin-right: 16px; }
      .timeline-card-image-wrapper { margin-bottom: 8px; }
      .timeline-card-caption { font-size: 11.5px; }
      
      .forecasting-split-layout { flex-direction: column; gap: 12px; padding: 0; margin: auto 0; align-items: flex-start; }
      .forecast-left-content { width: 100%; text-align: left; }
      .forecast-left-content .headline-large { font-size: 28px; margin-bottom: 8px; }
      .forecast-right-card { width: 100%; padding: 20px; border-radius: 20px; text-align: left; }
      .fc-eyebrow { margin-bottom: 14px; }
      .fc-description { margin-bottom: 16px; padding-bottom: 16px; }
      .fc-output-num { font-size: 48px; }
      
      .partnership-header-container { max-width: 100%; align-items: flex-start; text-align: left; margin-top: auto; }
      .partnership-header-container .eyebrow { margin-bottom: 6px; }
      .partnership-header-container .headline-large { font-size: 26px !important; text-align: left; margin-bottom: 6px; }
      .partnership-header-container .body-lead { text-align: left; font-size: 14px; margin-bottom: 8px !important; }
      .partnership-stack-container { max-width: 100%; margin-top: 4px; margin-bottom: auto; align-items: flex-start; text-align: left; }

            <div class="timeline-slider-spacer"></div>
            ${timelineCardsHtml}
            <div class="timeline-slider-spacer"></div>
          </div>
        </div>
      `;
      scroller.appendChild(s6);
      appendDot(5);

      // Add a dynamic breakpoint resize controller to ensure header match grids sync correctly across large displays
      const adjustTimelineSpacerWidths = () => {
        const textContainer = s6.querySelector('.centered-narrative-inner');
        if (textContainer && window.innerWidth > 968) {
          const computedGutterWidth = textContainer.getBoundingClientRect().left;
          document.querySelectorAll('.timeline-slider-spacer').forEach(spacer => {
            spacer.style.flex = `0 0 ${computedGutterWidth}px`;
            spacer.style.width = `${computedGutterWidth}px`;
          });
          textContainer.style.paddingLeft = '0';
          textContainer.style.paddingRight = '0';
        } else if(textContainer) {
          document.querySelectorAll('.timeline-slider-spacer').forEach(spacer => {
            spacer.style.flex = `0 0 24px`;
            spacer.style.width = `24px`;
          });
          textContainer.style.paddingLeft = '24px';
          textContainer.style.paddingRight = '24px';
        }
      };
      window.addEventListener('resize', adjustTimelineSpacerWidths);
      setTimeout(adjustTimelineSpacerWidths, 100);

      // --- 007: Conservation Pledge Call To Action ---
      const d7 = SITE_DATA.section007;
      const s7 = document.createElement('section');
      s7.className = 'narrative-section theme-light';
      s7.innerHTML = `
        <div class="centered-narrative-inner slide-seven-width" style="color: ${d7.textColor}">
          <p class="fade-el eyebrow delay-1">${d7.eyebrow}</p>
          <h1 class="fade-el headline-large delay-2" style="max-width: 100%; margin-bottom: 18px;">${d7.headline}</h1>
          <p class="fade-el body-lead delay-3" style="max-width: 100%; text-align: center; margin-bottom: 36px;">${d7.body}</p>
          <div class="fade-el delay-4 interactive-safe-zone">
            <a class="btn-unified" href="${d7.btnUrl}">${d7.btnText}</a>
          </div>
        </div>
        <div class="bottom-scroll-hint fade-el delay-4" style="color: ${d7.textColor}">
          <span>${d7.scrollHintText}</span>
          <span style="color: var(--brand-orange)">↓</span>
        </div>
      `;
      scroller.appendChild(s7);
      appendDot(6);

      // --- 008: Active Forecasting Section ---
      const d8 = SITE_DATA.section008;
      const s8 = document.createElement('section');
      s8.className = 'narrative-section theme-light';
      s8.innerHTML = `
        <div class="forecasting-split-layout">
          <div class="forecast-left-content">
            <p class="fade-el eyebrow delay-1">${d8.eyebrow}</p>
            <h1 class="fade-el headline-large delay-2">${d8.headline}</h1>
          </div>
          <div class="forecast-right-card fade-el delay-3 interactive-safe-zone" onclick="event.stopPropagation();">
            <span class="fc-eyebrow" style="line-height: 1.35; display: block; margin-bottom: 20px;">${d8.cardTitle}</span>
            <div class="fc-row">
              <span class="fc-label">${d8.metricLabel}</span>
              <span class="fc-value" id="calc-employee-val">100 employees</span>
            </div>
            <input type="range" min="0" max="1000" value="100" class="fc-slider-input" id="forecast-slider">
            <p class="fc-description">${d8.description}</p>
            <div class="fc-output-num" id="calc-output-metric">26,000</div>
            <span class="fc-output-label">${d8.outputSuffix}</span>
          </div>
        </div>
        <div class="bottom-scroll-hint fade-el delay-4" style="color: #121212">
          <span>${d8.scrollHintText}</span>
          <span style="color: var(--brand-orange)">↓</span>
        </div>
      `;
      scroller.appendChild(s8);
      appendDot(7);

      const slider = s8.querySelector('#forecast-slider');
      const labelVal = s8.querySelector('#calc-employee-val');
      const metricVal = s8.querySelector('#calc-output-metric');
      
      slider.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        if (val === 1000) {
          labelVal.textContent = "1000+ employees";
        } else {
          labelVal.textContent = `${val} employees`;
        }
        const computedImpact = val * 260; 
        metricVal.textContent = computedImpact.toLocaleString();
      });
      slider.dispatchEvent(new Event('input'));

      // --- 009: Tailored Partnerships UI ---
      const d9 = SITE_DATA.section009;
      const s9 = document.createElement('section');
      s9.className = 'narrative-section theme-light';
      
      let leftMenuHtml = '';
      d9.solutions.forEach((sol, index) => {
        leftMenuHtml += `
          <button class="pill-item-btn ${index === 0 ? 'is-active' : ''}" data-sol-id="${sol.id}">
            ${sol.pillLabel}
          </button>
        `;
      });

      s9.innerHTML = `
        <div class="partnership-header-container">
          <p class="fade-el eyebrow delay-1">${d9.eyebrow}</p>
          <h1 class="fade-el headline-large delay-2" style="margin-bottom: 12px; font-weight: 800;">${d9.headline}</h1>
          <p class="fade-el body-lead delay-3" style="font-size: 15px; margin-bottom: 14px;">${d9.body}</p>
        </div>
        
        <div class="partnership-stack-container fade-el delay-3 interactive-safe-zone" onclick="event.stopPropagation();">
          <div class="partnership-pills-row">
            ${leftMenuHtml}
          </div>
          <div class="partnership-compact-card" id="partnership-view-pane"></div>
        </div>
      `;
      scroller.appendChild(s9);
      appendDot(8);

      const renderActiveSolution = (solId) => {
        const sol = d9.solutions.find(item => item.id === solId);
        const pane = document.getElementById('partnership-view-pane');
        if (!sol || !pane) return;

        let bulletLines = '';
        sol.bullets.forEach(bullet => {
          bulletLines += `<div class="display-bullet">${bullet}</div>`;
        });

        pane.innerHTML = `
          <div style="width: 100%; text-align: left; display: flex; flex-direction: column; align-items: flex-start;">
            <h2 class="display-header-title">${sol.displayTitle}</h2>
            <p class="display-body-para">${sol.displayBody}</p>
            <div class="display-bullet-grid">
              ${bulletLines}
            </div>
            <a class="btn-unified" style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; max-width: fit-content;" href="mailto:partners@omawild.com">${d9.btnText}</a>
          </div>
        `;
      };
      renderActiveSolution(d9.solutions[0].id);

      document.querySelectorAll('.pill-item-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const targetId = btn.getAttribute('data-sol-id');
          document.querySelectorAll('.pill-item-btn').forEach(b => b.classList.remove('is-active'));
          btn.classList.add('is-active');
          renderActiveSolution(targetId);
        });
      });

      // Narrative Scroll Engine Bindings
      const wrapper = document.querySelector('.narrative-wrapper');
      const sections = document.querySelectorAll('.narrative-section');
      const timelineNodes = document.querySelectorAll('.timeline-node');

      const sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            sections.forEach(s => s.classList.remove('is-active'));
            entry.target.classList.add('is-active');
            
            // Sync dynamic logo visibility styles across changes
            const headerEl = document.querySelector('.corp-header');
            if(headerEl) {
              if(entry.target.classList.contains('theme-dark')) {
                headerEl.classList.remove('theme-light');
                headerEl.classList.add('theme-dark');
              } else {
                headerEl.classList.remove('theme-dark');
                headerEl.classList.add('theme-light');
              }
            }
            
            const cIdx = Array.from(sections).indexOf(entry.target);
            timelineNodes.forEach((n, idx) => n.classList.toggle('is-current', idx === cIdx));
            
            // Update Mobile Progress Bar
            const progressPercent = ((cIdx + 1) / sections.length) * 100;
            const mobProgressBar = document.getElementById('mobile-progress-indicator');
            if (mobProgressBar) {
              mobProgressBar.style.width = `${progressPercent}%`;
            }

            // Update Mobile Header Centered Counter
            const mobCounter = document.getElementById('mobile-slide-counter');
            if (mobCounter) {
              const slideNum = String(cIdx + 1).padStart(2, '0');
              const totalSlides = String(sections.length).padStart(2, '0');
              mobCounter.innerHTML = `<span class="active-digit">${slideNum}</span> / ${totalSlides}`;
            }

            // Fire dynamic layout resize alignment validation check specifically when shifting to slide index 6
            if (cIdx === 5) {
              adjustTimelineSpacerWidths();
            }
          }
        });
      }, { root: wrapper, threshold: 0.55 });
      sections.forEach(sec => sectionObserver.observe(sec));

      timelineNodes.forEach(node => {
        node.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(node.getAttribute('data-target-index'));
          if (sections[idx]) sections[idx].scrollIntoView({ behavior: 'smooth' });
        });
      });

      sections.forEach((section, index) => {
        section.addEventListener('click', (e) => {
          if (e.target.closest('.interactive-safe-zone') || e.target.closest('input') || e.target.closest('a') || e.target.closest('button')) return;
          if (sections[index + 1]) sections[index + 1].scrollIntoView({ behavior: 'smooth' });
        });
      });
    });
  </script>
</body>
</html>
